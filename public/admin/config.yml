backend:
  name: github
  repo: abjshawty/home
  branch: master
  base_url: https://oauth.abjshawty.dev
  auth_endpoint: auth

media_folder: "public/uploads"
public_folder: "/uploads"

collections:
  - name: "projects"
    label: "Projects"
    folder: "content/projects"
    create: true
    slug: "{{slug}}"
    extension: "mdx"
    format: "frontmatter"
    fields:
      - { name: "title", label: "Title", widget: "string" }
      - { name: "summary", label: "Summary", widget: "text" }
      - { name: "year", label: "Year", widget: "string", required: false }
      - { name: "tags", label: "Tags", widget: "list", required: false }
      - { name: "body", label: "Body", widget: "markdown" }

  - name: "rants"
    label: "Rants"
    folder: "content/rants"
    create: true
    slug: "{{slug}}"
    extension: "mdx"
    format: "frontmatter"
    fields:
      - { name: "title", label: "Title", widget: "string" }
      - { name: "excerpt", label: "Excerpt", widget: "text" }
      - { name: "date", label: "Date", widget: "datetime", format: "YYYY-MM-DD" }
      - name: "kind"
        label: "Kind"
        widget: "select"
        options:
          - { label: "Text", value: "text" }
          - { label: "Audio", value: "audio" }
          - { label: "Video", value: "video" }
      - { name: "duration", label: "Duration", widget: "string", required: false }
      - { name: "tags", label: "Tags", widget: "list", required: false }
      - { name: "body", label: "Body", widget: "markdown" }
